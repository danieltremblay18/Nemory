{% extends "base.html" %}
{% block title %}{{ 'Modifier le bien' if asset else 'Nouveau bien' }} · Nemory{% endblock %}

{% block content %}
<h1 class="page-title">{{ 'Modifier le bien' if asset else 'Nouveau bien' }}</h1>

<form method="post" class="form"
      action="{{ url_for('assets.edit', asset_id=asset.id) if asset else url_for('assets.create') }}">
  <label class="field">
    <span class="field__label">Nom</span>
    <input type="text" name="name" value="{{ asset.name if asset else '' }}"
           placeholder="Maison, Génératrice, Toiture…" autofocus required>
  </label>
  <button type="submit" class="btn btn--primary btn--block">Enregistrer</button>
</form>
{% endblock %}
