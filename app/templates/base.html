<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#121212">
  <title>{% block title %}Nemory{% endblock %}</title>
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="icon" href="{{ url_for('static', filename='icons/icon.svg') }}" type="image/svg+xml">
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  {% if g.authenticated %}
  <header class="app-bar">
    <a class="app-bar__title" href="{{ url_for('main.home') }}">Nemory</a>
    <a class="app-bar__action" href="{{ url_for('main.search') }}" aria-label="Search">
      <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5 1.5-1.5-5-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
    </a>
  </header>
  {% endif %}

  <main class="content">
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <div class="flash" role="status">
          {% for message in messages %}<p>{{ message }}</p>{% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    {% block content %}{% endblock %}
  </main>

  {% if g.authenticated %}
  <a class="fab" href="{{ url_for('activities.create') }}" aria-label="Add activity">
    <svg viewBox="0 0 24 24" width="26" height="26"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6z"/></svg>
  </a>

  <nav class="bottom-nav">
    <a href="{{ url_for('main.home') }}" class="{{ 'is-active' if request.endpoint == 'main.home' }}">
      <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Home</span>
    </a>
    <a href="{{ url_for('assets.index') }}" class="{{ 'is-active' if request.endpoint and request.endpoint.startswith('assets.') }}">
      <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
      <span>Assets</span>
    </a>
    <a href="{{ url_for('main.search') }}" class="{{ 'is-active' if request.endpoint == 'main.search' }}">
      <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27a6.5 6.5 0 1 0-.7.7l.27.28v.79l5 5 1.5-1.5-5-5zm-6 0A4.5 4.5 0 1 1 14 9.5 4.5 4.5 0 0 1 9.5 14z"/></svg>
      <span>Search</span>
    </a>
  </nav>
  {% endif %}

  <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
